# AppProject that scopes what the platform's Applications are allowed to do.
# Tighter than the default project: restricts source repos and destination
# namespaces so a bad Application can't deploy anywhere in the cluster.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  # Keep the project around even if this manifest is pruned.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Sample application + observability stack for platform-observability-stack.

  # Your fork (referenced by every Application) plus the Helm repos the
  # observability charts are pulled from. Update the github URL to your fork.
  sourceRepos:
    - https://github.com/OWNER/platform-observability-stack.git
    - https://prometheus-community.github.io/helm-charts

  # Where Applications in this project may deploy. Add namespaces here as later
  # phases introduce them (logging, tracing, chaos).
  destinations:
    - server: https://kubernetes.default.svc
      namespace: sample-app
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: monitoring

  # kube-prometheus-stack installs cluster scoped resources (CRDs, ClusterRoles,
  # ClusterRoleBindings), so the platform project must permit them.
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

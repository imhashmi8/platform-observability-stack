# Phase 4 log store: Loki in SingleBinary mode.
# Multi source app: chart from the grafana Helm repo, values from this git repo.
# sync wave "-4" puts it just after the metrics stack so the logging namespace
# and Loki are ready before Promtail starts shipping to it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 7.0.0
      helm:
        valueFiles:
          - $values/loki/loki-values.yaml
    - repoURL: https://github.com/OWNER/platform-observability-stack.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

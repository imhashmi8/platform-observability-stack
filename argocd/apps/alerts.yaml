# Phase 8 alerting rules. Directory app over alerts/, so new PrometheusRules
# dropped in that folder get applied here. sync wave "-2" so the Prometheus
# Operator CRDs from the metrics stack already exist.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alerts
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/imhashmi8/platform-observability-stack.git
    targetRevision: main
    path: alerts
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

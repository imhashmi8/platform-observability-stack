# Values for the kube-prometheus-stack chart (Phase 3).
# This bundle installs the Prometheus Operator, Prometheus, Alertmanager,
# Grafana, node-exporter and kube-state-metrics in one release. Later phases
# reuse the same Grafana and Alertmanager.

fullnameOverride: kube-prometheus-stack

# -----------------------------------------------------------------------------
# EKS specifics.
# The managed control plane does not expose these components for scraping, so
# leaving them on just produces permanently "down" targets. Turn them off.
# -----------------------------------------------------------------------------
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

# -----------------------------------------------------------------------------
# Prometheus
# -----------------------------------------------------------------------------
prometheus:
  prometheusSpec:
    # 30d so the Phase 7 error budget rules have a full SLO window of samples to
    # rate over. retentionSize is the hard cap; whichever limit is hit first wins.
    retention: 30d
    retentionSize: 18GB

    # Served under /prometheus on the shared ALB. The ALB forwards the path as is
    # (no rewrite), so Prometheus must own that prefix.
    routePrefix: /prometheus

    # Pick up every ServiceMonitor, PodMonitor and PrometheusRule in the cluster,
    # not only the ones carrying this release's labels. This is what lets the
    # backend ServiceMonitor (and the SLO rules added in Phase 6) be discovered.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}

    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        memory: 2Gi

    # Persistent storage backed by the EBS CSI driver from Phase 1. An empty
    # storageClassName uses the cluster default class.
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

# -----------------------------------------------------------------------------
# Alertmanager. Phase 8 routes the burn rate alerts to Slack by severity.
#
# The Slack webhook URL is a secret, so it is NOT in this file. Create a Secret
# named alertmanager-slack with a key "webhook" holding the incoming webhook URL
# (see docs/PHASE8.md), and the alertmanagerSpec.secrets list below mounts it at
# /etc/alertmanager/secrets/alertmanager-slack/webhook. The receivers read it
# with slack_api_url_file so nothing sensitive is committed.
# -----------------------------------------------------------------------------
alertmanager:
  enabled: true
  alertmanagerSpec:
    # Served under /alertmanager on the shared ALB.
    routePrefix: /alertmanager
    # Mounts the Slack webhook Secret into the Alertmanager pods.
    secrets:
      - alertmanager-slack
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

  # Rendered into the Alertmanager config secret by the chart.
  config:
    global:
      resolve_timeout: 5m
    route:
      # Group by the alert and which SLO it concerns so related burns batch up.
      group_by: ["alertname", "slo"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "slack-warning"
      routes:
        # The kube-prometheus-stack Watchdog always fires by design; drop it.
        - matchers: ['alertname = "Watchdog"']
          receiver: "null"
        - matchers: ['severity = "critical"']
          receiver: "slack-critical"
          repeat_interval: 1h
        - matchers: ['severity = "warning"']
          receiver: "slack-warning"
    receivers:
      - name: "null"
      - name: "slack-critical"
        slack_configs:
          - channel: "#alerts-critical"
            send_resolved: true
            slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack/webhook
            title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
            text: >-
              {{ range .Alerts }}*{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}
      - name: "slack-warning"
        slack_configs:
          - channel: "#alerts-warning"
            send_resolved: true
            slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack/webhook
            title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
            text: >-
              {{ range .Alerts }}*{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}
    # A critical burn for an SLO silences the warning burns for the same SLO.
    inhibit_rules:
      - source_matchers: ['severity = "critical"']
        target_matchers: ['severity = "warning"']
        equal: ["slo"]

# -----------------------------------------------------------------------------
# Grafana. This is the single Grafana the whole platform uses. Phase 4 and 5
# add the Loki and Tempo data sources to it.
# -----------------------------------------------------------------------------
grafana:
  enabled: true

  # Dev default only. For anything real, set admin.existingSecret to a Secret you
  # manage out of band rather than committing a password.
  adminPassword: "changeme-grafana-dev"

  # Served under /grafana on the shared ALB. serve_from_sub_path makes Grafana
  # emit asset and API URLs under that prefix so the UI works behind the path.
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"
      serve_from_sub_path: true

  persistence:
    enabled: true
    size: 5Gi

  defaultDashboardsEnabled: true

  # The sidecar watches for ConfigMaps labelled grafana_dashboard / grafana_datasource
  # so later phases can ship dashboards and data sources as plain ConfigMaps.
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true
      searchNamespace: ALL

  service:
    type: ClusterIP

# -----------------------------------------------------------------------------
# Cluster level exporters. Both on by default; listed for clarity.
# -----------------------------------------------------------------------------
nodeExporter:
  enabled: true
kubeStateMetrics:
  enabled: true

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

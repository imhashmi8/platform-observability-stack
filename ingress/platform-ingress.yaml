# One shared ALB for the platform UIs, via the AWS Load Balancer Controller
# IngressGroup feature: every Ingress with the same group.name lands on a single
# ALB, routed by path. Apply with kubectl after substituting your IP, like the
# ArgoCD ingress (kept out of auto-sync so your IP is not committed).
#
#   /grafana       -> Grafana
#   /prometheus    -> Prometheus
#   /alertmanager  -> Alertmanager
#   /              -> frontend app (catch-all, must be last)
#
# Sub-path serving for the three monitoring UIs is configured in
# prometheus/values.yaml (grafana root_url, prometheus/alertmanager routePrefix).
# Prometheus and Alertmanager have NO auth; the inbound-cidrs allowlist is the
# only thing guarding them.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    alb.ingress.kubernetes.io/group.name: platform
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/load-balancer-name: platform
    alb.ingress.kubernetes.io/inbound-cidrs: REPLACE_WITH_YOUR_IP/32
    alb.ingress.kubernetes.io/healthcheck-path: /grafana/api/health
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    alb.ingress.kubernetes.io/group.name: platform
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/load-balancer-name: platform
    alb.ingress.kubernetes.io/inbound-cidrs: REPLACE_WITH_YOUR_IP/32
    alb.ingress.kubernetes.io/healthcheck-path: /prometheus/-/healthy
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-prometheus
                port:
                  number: 9090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager
  namespace: monitoring
  annotations:
    alb.ingress.kubernetes.io/group.name: platform
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/load-balancer-name: platform
    alb.ingress.kubernetes.io/inbound-cidrs: REPLACE_WITH_YOUR_IP/32
    alb.ingress.kubernetes.io/healthcheck-path: /alertmanager/-/healthy
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /alertmanager
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-alertmanager
                port:
                  number: 9093
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-public
  namespace: sample-app
  annotations:
    alb.ingress.kubernetes.io/group.name: platform
    # Highest order so the "/" catch-all is evaluated after the specific paths.
    alb.ingress.kubernetes.io/group.order: "30"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/load-balancer-name: platform
    alb.ingress.kubernetes.io/inbound-cidrs: 223.226.67.105/32
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

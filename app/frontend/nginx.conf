# nginx serves the built SPA and reverse-proxies /api to the backend Service.
# BACKEND_URL is templated at container start by nginx's envsubst entrypoint
# (the image's /docker-entrypoint.d processes *.template files).

server {
    listen 8080;
    server_name _;

    # Health endpoint for the frontend's own k8s probes — never proxied.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

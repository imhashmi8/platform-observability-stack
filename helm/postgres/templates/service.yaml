# Headless service gives the StatefulSet a stable DNS name:
#   postgres.<namespace>.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgres.name" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: {{ .Values.service.port }}
      targetPort: postgres
  selector:
    {{- include "postgres.selectorLabels" . | nindent 4 }}

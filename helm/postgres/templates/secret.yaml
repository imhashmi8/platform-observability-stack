# Credentials Secret, shared with the backend chart by name (auth.existingSecret).
# Keys are consumed by both the postgres container (POSTGRES_*) and the backend
# (which maps username/password/database -> DB_* via secretKeyRef).
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.existingSecret }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.auth.username | quote }}
  password: {{ .Values.auth.password | quote }}
  database: {{ .Values.auth.database | quote }}

# Replace `image.repository` with your registry path, then set the immutable tag
# at deploy time. ArgoCD tracks whatever tag is committed here (or overridden per
# Application), so avoid `latest` — pin a digest or version for reproducible syncs.
image:
  repository: 528956693660.dkr.ecr.ap-south-1.amazonaws.com/platform-obs-backend
  tag: "0.1.1"
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 8000

# Postgres connection. host points at the postgres chart's headless Service;
# credentials come from the shared Secret (DB_USER/PASSWORD/NAME below).
postgres:
  host: postgres.sample-app.svc.cluster.local
  port: 5432
  existingSecret: postgres-credentials

# OpenTelemetry. Points at the Phase 5 OpenTelemetry Collector over OTLP gRPC.
# Set endpoint back to "" to disable tracing; the app treats empty as off.
otel:
  endpoint: "otel-collector.tracing.svc.cluster.local:4317"
  serviceName: backend

env:
  environment: dev
  logLevel: info

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# Prometheus scraping. The ServiceMonitor needs the Prometheus Operator CRD,
# installed by Phase 3 (kube-prometheus-stack), so it is enabled now.
metrics:
  port: 8000
  path: /metrics
  serviceMonitor:
    enabled: true
    interval: 15s

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: /metrics

# Hardened by default; the image already runs as uid 10001.
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
